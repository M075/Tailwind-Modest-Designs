  <div class="mx-auto max-w-xl lg:max-w-4xl">
    <h2 class="mt-4 text-4xl font-bold tracking-tight text-white">Let’s talk about your next project</h2>
    <p class="mt-2 text-lg leading-8 text-gray-300">We help companies and individuals build out their brand guidelines.</p>
    <div class="mt-16 flex flex-col gap-16 sm:gap-y-20 lg:flex-row">
      <form action="https://formsubmit.co/info@modestdesigns.co.za" method="POST" class="lg:flex-auto">
        <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
          <div>
            <label for="first-name" class="block text-sm font-semibold leading-6 text-gray-200">First name</label>
            <div class="mt-2.5">
              <input type="text" name="first-name" id="first-name" autocomplete="given-name" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
            </div>
          </div>
          <div>
            <label for="last-name" class="block text-sm font-semibold leading-6 text-gray-200">Last name</label>
            <div class="mt-2.5">
              <input type="text" name="last-name" id="last-name" autocomplete="family-name" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
            </div>
          </div>
          <div>
            <label for="budget" class="block text-sm font-semibold leading-6 text-gray-200">Contact</label>
            <div class="mt-2.5">
              <input id="budget" name="budget" type="tel" value="+27" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
            
            </div>
          </div>
          <div>
            <label for="website" class="block text-sm font-semibold leading-6 text-gray-200">Email</label>
            <div class="mt-2.5">
              <input type="email" name="website" id="email" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
            </div>
          </div>
          <div>
            <label for="budget" class="block text-sm font-semibold leading-6 text-gray-200">Budget</label>
            <div class="mt-2.5">
              <input id="budget" name="budget" type="number" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
            </div>
          </div>
          <div>
            <label for="website" class="block text-sm font-semibold leading-6 text-gray-200">Location</label>
            <div class="mt-2.5">
              <input type="text" name="website" id="website" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
            </div>
          </div>
          <div class="sm:col-span-2">
            <label for="message" class="block text-sm font-semibold leading-6 text-gray-200">Message</label>
            <div class="mt-2.5">
              <textarea id="message" name="message" rows="4" type="text" class="block w-full rounded-md border-0 px-3.5 py-2 bg-gray-800 text-gray-100 shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6"></textarea>
            </div>
          </div>
          
        </div>
        <div class="mt-10">
          <button type="submit" class="block w-full rounded-md bg-indigo-600 px-3.5 py-2.5 text-center text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-400">Let’s talk</button>
        </div>
        <p class="mt-4 text-sm leading-6 text-gray-400">By submitting this form, I agree to the <a href="/policies.html" class="font-semibold text-indigo-400 underline">privacy&nbsp;policy</a>.</p>
      </form>
      <div class="lg:mt-6 lg:w-80 lg:flex-none">
        <img class="h-12 w-auto" src="https://tailwindui.com/img/logos/workcation-logo-indigo-600.svg" alt="">

            <p>“Our clients are at the heart of everything we do & hence, we prioritize swift communication. We also strive to deliver the best service possible.”</p>
