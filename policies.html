<div x-data="{ activeTab: 'Ts & Cs' }">
  <div class="sm:hidden">
    <div class="mx-auto mt-10 text-center">
      <label for="tabs" class="text-lg font-semibold">Select a policy to view</label>
    </div>
    <div class="border px-4 mt-2 w-3/4 mx-auto border-indigo-500 bg-gray-900 rounded-lg mb-4">
      <select id="tabs" name="tabs" class="block w-full rounded-md border-none bg-gray-900 text-gray-100 focus:ring-2 focus:ring-indigo-500 px-3 py-2" x-model="activeTab">
        <option>Ts & Cs</option>
        <option>Refunds</option>
        <option>Delivery</option>
        <option>Billing</option>
        <option>Privacy</option>
      </select>
    </div>
  </div>
  <div class="hidden sm:block">
    <div class="px-6 py-4 mb-4">
      <nav class="-mb-px flex" aria-label="Tabs">
        <a @click.prevent="activeTab = 'Ts & Cs'"
          :class="activeTab === 'Ts & Cs'
            ? 'border-indigo-500 border-b-2 text-indigo-600'
            : 'border-gray-500 text-gray-500 hover:cursor-pointer hover:text-indigo-600 hover:border-indigo-500'"
          class="w-1/5 border-b-1 px-4 py-3 text-center text-sm font-medium transition">
          Ts & Cs
        </a>
        <a @click.prevent="activeTab = 'Refunds'"
          :class="activeTab === 'Refunds'
            ? 'border-indigo-500 border-b-2 text-indigo-600'
            : 'border-gray-500 text-gray-500 hover:cursor-pointer hover:text-indigo-600 hover:border-indigo-500'"
          class="w-1/5 border-b-1 px-4 py-3 text-center text-sm font-medium transition">
          Refunds
        </a>
        <a  @click.prevent="activeTab = 'Delivery'"
          :class="activeTab === 'Delivery'
            ? 'border-indigo-500 border-b-2 text-indigo-600'
            : 'border-gray-500 text-gray-500 hover:cursor-pointer hover:text-indigo-600 hover:border-indigo-500'"
          class="w-1/5 border-b-1 px-4 py-3 text-center text-sm font-medium transition">
          Delivery
        </a>
        <a @click.prevent="activeTab = 'Billing'"
          :class="activeTab === 'Billing'
            ? 'border-indigo-500 border-b-2 text-indigo-600'
            : 'border-gray-500 text-gray-500 hover:cursor-pointer hover:text-indigo-600 hover:border-indigo-500'"
          class="w-1/5 border-b-1 px-4 py-3 text-center text-sm font-medium transition">
          Billing
        </a>
        <a @click.prevent="activeTab = 'Privacy'"
          :class="activeTab === 'Privacy'
            ? 'border-indigo-500 border-b-2 text-indigo-600'
            : 'border-gray-500 text-gray-500 hover:cursor-pointer hover:text-indigo-600 hover:border-indigo-500'"
          class="w-1/5 border-b-1 px-4 py-3 text-center text-sm font-medium transition">
          Privacy
        </a>
      </nav>
    </div>
  </div>
  <!-- Tab content -->
  <div class="mt-8">
    <div x-show="activeTab === 'Ts & Cs'">
      <div id="terms"></div>
    </div>
    <div x-show="activeTab === 'Refunds'">
      <div id="refunds"></div>
    </div>
    <div x-show="activeTab === 'Delivery'">

      <div id="billing"></div>
    </div>
    <div x-show="activeTab === 'Privacy'">
      <div id="privacy"></div>
    </div>
  </div>
